<!DOCTYPE html>
<html>
  <head>
    <base href="/andreee13/" />
    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="Andrea's portfolio" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="portfolio" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <title>Loading...</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="./style.css" />
    <script
      src="https://cdn.ethers.io/lib/ethers-5.4.umd.min.js"
      type="application/javascript"
      defer
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@walletconnect/web3-provider@1.6.5/dist/umd/index.min.js"
      type="application/javascript"
      defer
    ></script>
    <script type="module" defer>
      import { Application } from "./canvas/runtime.js";
      const canvas = document.getElementById("canvas3d");
      const app = new Application(canvas);
      app.load("https://prod.spline.design/UhBrhSa1I1-K2168/scene.splinecode");
    </script>
    <script>
      var serviceWorkerVersion = '1691148087';
    </script>
    <script src="flutter.js" defer></script>
  </head>
  <body>
    <canvas class="canvas3d" id="canvas3d"></canvas>
    <div class="centerDiv">
      <div id="loading">
        <img src="icons/Icon-192.png" alt="Loading" />
      </div>
      <progress id="progressBar" max="100"></progress>
    </div>
    <script>
      var current_progress = 0,
        step = 0.5,
        status = 0;
      var bar = document.getElementById("progressBar");
      setInterval(() => {
        if (status == 1) {
          current_progress = 33;
        } else if (status == 2) {
          current_progress = 66;
        } else if (status == 3) {
          bar.value = 100;
          clearInterval(this);
          return;
        }
        bar.value = current_progress;
        current_progress += step;
      }, 10);
      window.addEventListener("load", (ev) => {
        const loading = document.getElementById("loading");
        _flutter.loader
          .loadEntrypoint({
            serviceWorker: {
              serviceWorkerVersion: serviceWorkerVersion,
            },
          })
          .then((engineInitializer) => {
            loading.classList.add("step_1");
            status = 1;
            return engineInitializer.initializeEngine();
          })
          .then((appRunner) => {
            status = 2;
            loading.classList.add("step_2");
            return appRunner.runApp();
          })
          .then((app) => {
            status = 3;
            window.setTimeout(() => loading.remove(), 200);
          });
      });
    </script>
    <noscript>JavaScript is not supported by your browser</noscript>
  </body>
</html>
