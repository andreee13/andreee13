<!DOCTYPE html>
<html>
  <head>
    <base href="/andreee13/" />
    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="A new Flutter project." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="portfolio" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <title>Loading...</title>
    <link rel="manifest" href="manifest.json" />
    <script
      src="https://cdn.ethers.io/lib/ethers-5.4.umd.min.js"
      type="application/javascript"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@walletconnect/web3-provider@1.6.5/dist/umd/index.min.js"
      type="application/javascript"
    ></script>
    <script>
      var serviceWorkerVersion = '1474454665';
    </script>
    <script src="flutter.js" defer></script>
  </head>
  <body>
    <div id="loading">
      <style>
        body {
          inset: 0;
          overflow: hidden;
          margin: 0;
          padding: 0;
          position: fixed;
          background-color: black;
        }
        #loading {
          align-items: center;
          display: flex;
          height: 100%;
          justify-content: center;
          width: 100%;
          animation: 1s ease-in-out 0s infinite alternate breathe;
          opacity: 0.66;
          transition: opacity 0.4s;
        }
        #loading.step_1 {
          opacity: 1;
        }
        #loading.step_2 {
          animation: 0.33s ease-in-out 0s 1 forwards zoom;
          opacity: 0;
        }
        @keyframes breathe {
          from {
            transform: scale(1);
          }
          to {
            transform: scale(0.95);
          }
        }
        @keyframes zoom {
          from {
            transform: scale(1);
          }
          to {
            transform: scale(10);
          }
        }
      </style>
      <img src="icons/Icon-192.png" alt="Loading" />
    </div>
    <script>
      window.addEventListener("load", (ev) => {
        const loading = document.getElementById("loading");
        _flutter.loader
          .loadEntrypoint({
            serviceWorker: {
              serviceWorkerVersion: serviceWorkerVersion,
            },
          })
          .then((engineInitializer) => {
            loading.classList.add("step_1");
            return engineInitializer.initializeEngine();
          })
          .then((appRunner) => {
            loading.classList.add("step_2");
            return appRunner.runApp();
          })
          .then((app) => {
            window.setTimeout(() => loading.remove(), 200);
          });
      });
    </script>
  </body>
</html>
